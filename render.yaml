# Render Blueprint — provisions the backend web service + a PostgreSQL database.
# In Render: New + -> Blueprint -> connect this repo, and it reads this file.
services:
  - type: web
    name: inventory-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false # set to your frontend URL after deploying the frontend
      - key: LOW_STOCK_THRESHOLD
        value: "10"

databases:
  - name: inventory-db
    databaseName: inventory
    plan: free
